services:

  # ── Tengu MCP Server ─────────────────────────────────────────────────────────
  tengu:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TENGU_TIER: ${TENGU_TIER:-core}
    image: tengu:${TENGU_TIER:-core}
    ports:
      - "${TENGU_PORT:-8000}:8000"
    cap_add:
      - NET_RAW    # required for nmap SYN scan and masscan raw sockets
      - NET_ADMIN  # required for masscan
    security_opt:
      - no-new-privileges
    volumes:
      - tengu-output:/app/output
      - tengu-logs:/app/logs
    env_file:
      - path: .env
        required: false
    environment:
      - TENGU_CONFIG_PATH=/app/tengu.toml
      - TENGU_ALLOWED_HOSTS=${TENGU_ALLOWED_HOSTS:-}
      - TENGU_LOG_LEVEL=${TENGU_LOG_LEVEL:-INFO}
      - NVD_API_KEY=${NVD_API_KEY:-}
      - TENGU_SHODAN_API_KEY=${TENGU_SHODAN_API_KEY:-}
      - ZAP_BASE_URL=http://tengu-zap:8080
      - ZAP_API_KEY=${ZAP_API_KEY:-tengu-zap-key}
      - MSF_RPC_HOST=tengu-msf
      - MSF_RPC_PORT=55553
      - MSF_RPC_PASSWORD=${MSF_RPC_PASSWORD:-tengu}
    restart: unless-stopped
    networks:
      tengu-net:
        aliases:
          - tengu

  # ── Metasploit RPC (profile: exploit) ────────────────────────────────────────
  tengu-msf:
    image: metasploitframework/metasploit-framework:latest
    profiles:
      - exploit
    environment:
      - MSF_RPC_PASSWORD=${MSF_RPC_PASSWORD:-tengu}
    command: bash -c "/usr/src/metasploit-framework/msfrpcd -P $$MSF_RPC_PASSWORD -S -f -a 0.0.0.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/55553"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      tengu-net:
        aliases:
          - tengu-msf

  # ── OWASP ZAP (profile: proxy) ───────────────────────────────────────────────
  tengu-zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    profiles:
      - proxy
    command: zap.sh -daemon -host 0.0.0.0 -port 8080
      -config api.key=${ZAP_API_KEY:-tengu-zap-key}
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      tengu-net:
        aliases:
          - tengu-zap

  # ── Lab Targets (profile: lab) ───────────────────────────────────────────────
  juice-shop:
    image: bkimminich/juice-shop:latest
    profiles:
      - lab
    restart: unless-stopped
    networks:
      tengu-net:
        aliases:
          - juice-shop

  dvwa:
    image: vulnerables/web-dvwa:latest
    profiles:
      - lab
    restart: unless-stopped
    networks:
      tengu-net:
        aliases:
          - dvwa

  # ── Tengu Autonomous Agent (profile: agent) ──────────────────────────────────
  tengu-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TENGU_TIER: ${TENGU_TIER:-core}
    image: tengu:${TENGU_TIER:-core}
    profiles:
      - agent
    depends_on:
      tengu:
        condition: service_healthy
    entrypoint: ["/entrypoint-agent.sh"]
    volumes:
      - tengu-output:/app/output
      - tengu-logs:/app/logs
    env_file:
      - path: .env
        required: true    # .env must exist — needs ANTHROPIC_API_KEY
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TENGU_AGENT_TARGET=${TENGU_AGENT_TARGET:-}
      - TENGU_AGENT_SCOPE=${TENGU_AGENT_SCOPE:-}
      - TENGU_AGENT_TYPE=${TENGU_AGENT_TYPE:-blackbox}
      - TENGU_AGENT_MAX_ITER=${TENGU_AGENT_MAX_ITER:-50}
      - TENGU_AGENT_MODEL=${TENGU_AGENT_MODEL:-claude-sonnet-4-6}
      - TENGU_AGENT_MAX_TOKENS=${TENGU_AGENT_MAX_TOKENS:-2048}
      - TENGU_AGENT_TIMEOUT=${TENGU_AGENT_TIMEOUT:-60}
      - TENGU_ALLOWED_HOSTS=${TENGU_ALLOWED_HOSTS:-}
      - TENGU_LOG_LEVEL=${TENGU_LOG_LEVEL:-INFO}
      - TENGU_CONFIG_PATH=/app/tengu.toml
      - TENGU_AGENT_AUTO_APPROVE=${TENGU_AGENT_AUTO_APPROVE:-false}
    cap_add:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges
    stdin_open: true    # Required for human-in-the-loop approval prompts
    tty: true           # Required for human-in-the-loop approval prompts
    networks:
      tengu-net:
        aliases:
          - tengu-agent

networks:
  tengu-net:
    name: tengu-net
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  tengu-output:
    name: tengu-output
  tengu-logs:
    name: tengu-logs
